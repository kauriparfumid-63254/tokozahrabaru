<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arisan Gula 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{font-family:'Plus Jakarta Sans',sans-serif;box-sizing:border-box}
:root{--bg:#FDF6EE;--card:#FFF;--fg:#2C1810;--fg2:#7A5C3F;--muted:#BFA68A;--accent:#D4880F;--al:#FEF3C7;--ad:#A66C00;--border:#E8D5B7;--ok:#16A34A;--ol:#DCFCE7;--err:#DC2626;--el:#FEE2E2}
body{background:var(--bg);color:var(--fg);min-height:100vh;margin:0;background:linear-gradient(135deg,#FDF6EE 0%,#FEF3C7 40%,#FDF6EE 100%);background-size:200% 200%;animation:gs 20s ease infinite}
@keyframes gs{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.page{display:none}.page.active{display:block}
.tab-btn{transition:all .2s;cursor:pointer;background:none;border:none;border-bottom:3px solid transparent;padding:14px 18px;font-size:13px;font-weight:600;color:var(--fg2);white-space:nowrap}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}.tab-btn:hover{color:var(--ad)}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:transform .2s,box-shadow .2s}.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(44,24,16,.08)}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;border:none;cursor:pointer;transition:all .15s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--ad);transform:translateY(-1px)}
.btn-s{background:var(--ok);color:#fff}.btn-s:hover{background:#15803d}
.btn-d{background:var(--err);color:#fff}.btn-d:hover{background:#b91c1c}
.btn-o{background:transparent;border:2px solid var(--border);color:var(--fg2)}.btn-o:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.toggle{position:relative;width:48px;height:26px;cursor:pointer;flex-shrink:0}.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:#D1D5DB;border-radius:26px;transition:.25s}
.toggle .slider:before{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.slider{background:var(--ok)}.toggle input:checked+.slider:before{transform:translateX(22px)}
.modal-overlay{position:fixed;inset:0;background:rgba(44,24,16,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border-radius:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:12px;color:#fff;font-weight:600;font-size:14px;animation:toastIn .3s ease,toastOut .3s ease 2.7s;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast-success{background:var(--ok)}.toast-danger{background:var(--err)}.toast-info{background:var(--accent)}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
input[type="text"],input[type="number"],input[type="date"],select{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;transition:border-color .2s;background:var(--bg);color:var(--fg)}
input:focus,select:focus{outline:none;border-color:var(--accent)}
input[disabled]{opacity:.6;cursor:not-allowed}
.month-tab{padding:8px 16px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;border:2px solid transparent}
.month-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(212,136,15,.3)}
.month-tab:not(.active){background:var(--card);color:var(--fg2);border-color:var(--border)}.month-tab:not(.active):hover{border-color:var(--accent);color:var(--accent)}
.member-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background .15s}.member-row:hover{background:var(--al)}.member-row:last-child{border-bottom:none}
.avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.lot-badge{background:var(--al);color:var(--ad);padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap}
.sticky-bar{position:sticky;bottom:0;background:var(--card);border-top:2px solid var(--border);padding:16px;z-index:10;border-radius:0 0 16px 16px}
table{width:100%;border-collapse:collapse}
th{background:var(--al);color:var(--ad);padding:10px 12px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;text-align:left;position:sticky;top:0;z-index:2}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}tr:hover td{background:rgba(254,243,199,.3)}
.pinjaman-card{border:1px solid var(--border);border-radius:16px;padding:20px;background:var(--card);margin-bottom:16px}.pinjaman-card:hover{box-shadow:0 4px 16px rgba(44,24,16,.06)}
.progress-bar{height:8px;background:#E5E7EB;border-radius:8px;overflow:hidden}.progress-fill{height:100%;border-radius:8px;transition:width .5s ease}
.kas-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}.kas-row:last-child{border-bottom:none}
.denda-edit-btn{background:none;border:1px solid var(--border);color:var(--fg2);width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;transition:all .15s;flex-shrink:0}
.denda-edit-btn:hover{border-color:var(--err);color:var(--err);background:var(--el)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px}
@media(max-width:640px){.stat-grid{grid-template-columns:repeat(2,1fr)!important}.month-scroll{overflow-x:auto}.member-row{flex-wrap:wrap}.hide-mobile{display:none}}
#printArea{display:none}
@media print{body>*{display:none!important}#printArea{display:block!important;position:fixed;left:0;top:0;width:100%;background:#fff;z-index:99999;padding:20px}
.pr{border:2px solid #333;border-radius:4px;padding:24px;max-width:400px;margin:0 auto 20px;page-break-inside:avoid}
.pr h2{text-align:center;font-size:16px;margin-bottom:2px}.pr h3{text-align:center;font-size:11px;font-weight:400;color:#666;margin-bottom:16px}
.pr table{width:100%;border-collapse:collapse}.pr td{padding:5px 0;border:none;font-size:13px}.pr td:first-child{width:140px;color:#555}.pr td:last-child{font-weight:700;text-align:right}
.prl{border-top:1px dashed #999;margin:14px 0}
.psg{display:flex;justify-content:space-between;margin-top:40px}.psg div{text-align:center;font-size:12px;color:#555}.psg .sln{display:block;width:120px;border-bottom:1px solid #333;margin-top:60px}}
</style>
</head>
<body>

<header style="background:linear-gradient(135deg,#1E0F08,#3D1F00);color:#D4B896;padding:0">
<div style="max-width:1200px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
<div style="display:flex;align-items:center;gap:12px">
<div style="width:42px;height:42px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center"><i class="fas fa-cubes-stacked" style="color:#fff;font-size:18px"></i></div>
<div><h1 style="margin:0;font-size:18px;font-weight:800;color:#FFF;line-height:1.2">Arisan Gula 2026</h1><p style="margin:0;font-size:11px;color:#BFA68A;font-weight:500">April 2026 - Januari 2027</p></div>
</div>
<div style="display:flex;gap:8px">
<button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#D4B896;border:1px solid rgba(255,255,255,.15)" onclick="exportCSV()"><i class="fas fa-download"></i><span class="hide-mobile">Export</span></button>
<button class="btn btn-sm" style="background:rgba(220,38,38,.2);color:#FCA5A5;border:1px solid rgba(220,38,38,.3)" onclick="resetD()"><i class="fas fa-rotate-left"></i></button>
</div>
</div>
</header>

<nav style="background:var(--card);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:50">
<div style="max-width:1200px;margin:0 auto;padding:0 20px;display:flex;gap:4px;overflow-x:auto">
<button class="tab-btn active" data-pg="dashboard"><i class="fas fa-chart-pie" style="margin-right:6px"></i>Dashboard</button>
<button class="tab-btn" data-pg="setoran"><i class="fas fa-money-bill-wave" style="margin-right:6px"></i>Setoran</button>
<button class="tab-btn" data-pg="pinjaman"><i class="fas fa-hand-holding-dollar" style="margin-right:6px"></i>Pinjaman</button>
<button class="tab-btn" data-pg="anggota"><i class="fas fa-users" style="margin-right:6px"></i>Anggota</button>
<button class="tab-btn" data-pg="kas"><i class="fas fa-wallet" style="margin-right:6px"></i>Kas</button>
</div>
</nav>

<main style="max-width:1200px;margin:0 auto;padding:20px">
<div id="page-dashboard" class="page active"></div>
<div id="page-anggota" class="page"></div>
<div id="page-setoran" class="page"></div>
<div id="page-pinjaman" class="page"></div>
<div id="page-kas" class="page"></div>
</main>

<div id="modal-overlay" class="modal-overlay"><div class="modal-box" id="modal-box"></div></div>
<div class="toast-container" id="toast-container"></div>
<div id="printArea"></div>

<script>
var HPL=20000,DENDA=1000;
var BULAN=['APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOPEMBER','DESEMBER','JANUARI'];
var BL={APRIL:'April',MEI:'Mei',JUNI:'Juni',JULI:'Juli',AGUSTUS:'Agustus',SEPTEMBER:'September',OKTOBER:'Oktober',NOPEMBER:'November',DESEMBER:'Desember',JANUARI:'Januari'};
var AVC=['#D4880F','#16A34A','#DC2626','#7C3AED','#0891B2','#C026D3','#EA580C','#4F46E5','#059669','#DB2777','#CA8A04','#2563EB','#9333EA','#0D9488','#E11D48','#65A30D'];

function defData(){
var a=[{id:1,nama:'ERMA',lot:5},{id:2,nama:'LINDA',lot:5},{id:3,nama:'BU RW',lot:8},{id:4,nama:'TUN SETO',lot:4},{id:5,nama:'KARTINI',lot:2},{id:6,nama:'ZAHRA',lot:10},{id:7,nama:'MODOT',lot:7},{id:8,nama:'WARSINI',lot:2},{id:9,nama:'LINA',lot:3},{id:10,nama:'AMBAR',lot:2},{id:11,nama:'YANI',lot:3},{id:12,nama:'MUSKARDI',lot:2},{id:13,nama:'DUA',lot:2},{id:14,nama:'PB',lot:1},{id:15,nama:'BU WAINEM',lot:1},{id:16,nama:'RIRIS',lot:2},{id:17,nama:'BU GINUK',lot:5},{id:18,nama:'BU NURUL',lot:2},{id:19,nama:'DELISA',lot:2},{id:20,nama:'HANAN Barang',lot:3},{id:21,nama:'HANAN Uang',lot:2},{id:22,nama:'NASIB',lot:1},{id:23,nama:'SUKIYEM',lot:2},{id:24,nama:'DWI ATAR',lot:2},{id:25,nama:'IDA PUJI',lot:3},{id:26,nama:'PUJI',lot:5},{id:27,nama:'SUYATI',lot:2},{id:28,nama:'BU ATIN',lot:2},{id:29,nama:'INTAN',lot:5},{id:30,nama:'JEPPY',lot:10}];
var s={APRIL:{1:5,2:5,3:8,4:4,5:2,6:10,7:7,8:2,9:3,10:2,11:3,12:2,13:2,14:1,15:1,16:2,17:5,18:2,19:2,20:3,21:2,22:1,23:2,24:2,25:3,26:5,27:2,28:2,29:5,30:10},MEI:{5:2,6:10,7:7,12:2,16:2,23:2},JUNI:{5:2,6:10,7:7,12:2,16:2},JULI:{7:7,12:2,16:2,23:2},AGUSTUS:{12:2,16:2},SEPTEMBER:{16:2},OKTOBER:{16:2},NOPEMBER:{16:2},DESEMBER:{16:2},JANUARI:{16:2}};
var d={MEI:{5:2000,6:10000,7:7000,12:2000,16:2000,23:2000},JUNI:{5:2000,6:10000,7:7000,12:2000,16:2000},JULI:{7:7000,12:2000,16:2000,23:2000},AGUSTUS:{12:2000,16:2000},SEPTEMBER:{16:2000},OKTOBER:{16:2000},NOPEMBER:{16:2000},DESEMBER:{16:2000},JANUARI:{16:2000}};
var p=[{id:1,anggotaId:13,pokok:1500000,bunga:75000},{id:2,anggotaId:8,pokok:1500000,bunga:75000}];
return{anggota:a,setoran:s,denda:d,pinjaman:p,angsuran:{1:{},2:{}},kas:[{id:1,tanggal:'2026-04-01',masuk:3600000,keluar:0,ket:'Saldo awal + Setoran April'},{id:2,tanggal:'2026-04-02',masuk:0,keluar:1500000,ket:'Pinjaman DUA'},{id:3,tanggal:'2026-04-03',masuk:0,keluar:1500000,ket:'Pinjaman WARSINI'}],nid:31,npid:3,nkid:4}}

var D={},curPage='dashboard',curMonth='APRIL',draft={};
function loadD(){try{var s=localStorage.getItem('arisanGula2026v5');if(s){D=JSON.parse(s);if(!D.denda)D.denda={};return}}catch(e){}D=defData()}
function saveD(){localStorage.setItem('arisanGula2026v5',JSON.stringify(D))}
function fm(n){if(!n)return'Rp 0';var a=Math.abs(n);return(n<0?'-Rp ':'Rp ')+a.toLocaleString('id-ID')}
function ini(n){return n.split(' ').map(function(w){return w[0]}).join('').substring(0,2).toUpperCase()}
function avc(id){return AVC[id%AVC.length]}
function gA(id){return D.anggota.find(function(a){return a.id===id})}
function tsb(b){var s=D.setoran[b]||{},t=0;for(var k in s)t+=s[k]*HPL;return t}
function tsk(){var t=0;BULAN.forEach(function(b){t+=tsb(b)});return t}
function tsa(id){var t=0;BULAN.forEach(function(b){var s=D.setoran[b]||{};if(s[id])t+=s[id]*HPL});return t}
function bsb(id){var c=0;BULAN.forEach(function(b){if((D.setoran[b]||{})[id])c++});return c}
function tl(){var t=0;D.anggota.forEach(function(a){t+=a.lot});return t}
function sk(){var t=0;D.kas.forEach(function(k){t+=k.masuk-k.keluar});return t}
function tmk(){var t=0;D.kas.forEach(function(k){t+=k.masuk});return t}
function tkl(){var t=0;D.kas.forEach(function(k){t+=k.keluar});return t}
function tpa(){var t=0;D.pinjaman.forEach(function(p){t+=p.pokok+p.bunga});return t}
function tad(pid){var a=D.angsuran[pid]||{},t=0;for(var k in a)t+=a[k];return t}
function ftd(s){if(!s)return'-';var d=new Date(s);return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}
function tdb(b){var s=D.denda[b]||{},t=0;for(var k in s)t+=s[k];return t}
function tdk(){var t=0;BULAN.forEach(function(b){t+=tdb(b)});return t}
function tdAng(id){var t=0;BULAN.forEach(function(b){var s=D.denda[b]||{};if(s[id])t+=s[id]});return t}
function isTerlambat(){return new Date().getDate()>10}

function toast(msg,type){type=type||'success';var c=document.getElementById('toast-container'),t=document.createElement('div');t.className='toast toast-'+type;var ic=type==='success'?'check-circle':type==='danger'?'exclamation-circle':'info-circle';t.innerHTML='<i class="fas fa-'+ic+'" style="margin-right:8px"></i>'+msg;c.appendChild(t);setTimeout(function(){if(t.parentNode)t.remove()},3000)}
function openM(title,body,footer){var box=document.getElementById('modal-box');box.innerHTML='<div style="padding:24px 24px 0;display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0;font-size:18px;font-weight:800">'+title+'</h3><button onclick="closeM()" style="background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer"><i class="fas fa-xmark"></i></button></div><div style="padding:20px 24px">'+body+'</div>'+(footer?'<div style="padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end">'+footer+'</div>':'');document.getElementById('modal-overlay').classList.add('show')}
function closeM(){document.getElementById('modal-overlay').classList.remove('show')}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeM()});

// NAVIGASI
document.querySelectorAll('.tab-btn').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});curPage=btn.getAttribute('data-pg');document.getElementById('page-'+curPage).classList.add('active');renderPage(curPage)})});
function renderPage(p){if(p==='dashboard')rDash();else if(p==='anggota')rAng();else if(p==='setoran')rSet();else if(p==='pinjaman')rPin();else if(p==='kas')rKas()}
function go(p){document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-pg')===p)});document.querySelectorAll('.page').forEach(function(pg){pg.classList.remove('active')});document.getElementById('page-'+p).classList.add('active');curPage=p;renderPage(p)}

// DASHBOARD
function rDash(){var el=document.getElementById('page-dashboard'),ts=tsk(),sl=sk(),td=tdk();
el.innerHTML='<div class="stat-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px">'+sc('fa-users','TOTAL ANGGOTA',D.anggota.length,tl()+' lot','var(--al)','var(--accent)','32')+sc('fa-money-bill-wave','TOTAL SETORAN',fm(ts),BULAN.length+' bulan','var(--ol)','var(--ok)','24')+sc('fa-triangle-exclamation','TOTAL DENDA',fm(td),'Bayar lewat tgl 10','var(--el)','var(--err)','24')+sc('fa-hand-holding-dollar','PINJAMAN',fm(tpa()),D.pinjaman.length+' peminjam','var(--el)','var(--err)','24')+sc('fa-wallet','SALDO KAS',fm(sl),'','var(--al)','#4F46E5','24')+'</div><div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px"><div class="card" style="padding:20px"><h3 style="margin:0 0 16px;font-size:15px;font-weight:700"><i class="fas fa-chart-bar" style="color:var(--accent);margin-right:8px"></i>Setoran & Denda per Bulan</h3><canvas id="chartSet" style="width:100%;height:220px"></canvas></div><div class="card" style="padding:20px"><h3 style="margin:0 0 16px;font-size:15px;font-weight:700"><i class="fas fa-bolt" style="color:var(--accent);margin-right:8px"></i>Aksi Cepat</h3><div style="display:flex;flex-direction:column;gap:10px"><button class="btn btn-p" style="justify-content:flex-start;width:100%" onclick="go(\'anggota\');setTimeout(openAngM,100)"><i class="fas fa-user-plus"></i>Tambah Anggota</button><button class="btn btn-s" style="justify-content:flex-start;width:100%" onclick="go(\'setoran\')"><i class="fas fa-credit-card"></i>Input Setoran</button><button class="btn btn-o" style="justify-content:flex-start;width:100%" onclick="go(\'pinjaman\');setTimeout(openPinM,100)"><i class="fas fa-plus"></i>Tambah Pinjaman</button><button class="btn btn-o" style="justify-content:flex-start;width:100%" onclick="go(\'kas\');setTimeout(openKasM,100)"><i class="fas fa-receipt"></i>Catat Transaksi</button></div></div></div><div class="card" style="padding:20px"><h3 style="margin:0 0 16px;font-size:15px;font-weight:700"><i c function rKas(){var el=document.getElementById('page-kas'),m=tmk(),k=tkl(),s=m-k,tr=D.kas.slice().reverse();el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:22px;font-weight:900">Laporan Kas</h2><button class="btn btn-p" onclick="openKasM()"><i class="fas fa-plus"></i>Tambah</button></div><div class="stat-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px"><div class="stat-card" style="border-left:4px solid var(--ok)"><div style="font-size:12px;color:var(--fg2);font-weight:600;margin-bottom:4px">MASUK</div><div style="font-size:24px;font-weight:900;color:var(--ok)">'+fm(m)+'</div></div><div class="stat-card" style="border-left:4px solid var(--err)"><div style="font-size:12px;color:var(--fg2);font-weight:600;margin-bottom:4px">KELUAR</div><div style="font-size:24px;font-weight:900;color:var(--err)">'+fm(k)+'</div></div><div class="stat-card" style="border-left:4px solid '+(s>=0?'#4F46E5':'var(--err')+'"><div style="font-size:12px;color:var(--fg2);font-weight:600;margin-bottom:4px">SALDO</div><div style="font-size:24px;font-weight:900;color:'+(s>=0?'#4F46E5':'var(--err)')+'">'+fm(s)+'</div></div></div><div class="card">'+(tr.length?tr.map(function(x,i){var im=x.masuk>0,run=0;for(var j=0;j<D.kas.length-i;j++)run+=D.kas[j].masuk-D.kas[j].keluar;return'<div class="kas-row"><div style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:'+(im?'var(--ol)':'var(--el')+'"><i class="fas fa-arrow-'+(im?'down':'up')+'" style="color:'+(im?'var(--ok)':'var(--err)')+';font-size:14px"></i></div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px">'+(x.ket||'-')+'</div><div style="font-size:12px;color:var(--fg2)">'+ftd(x.tgl)+'</div></div><div style="text-align:right;margin:0 12px"><span style="color:'+(im?'var(--ok)':'var(--err)')+';font-weight:700">'+(im?'+':'-')+fm(im?x.m
