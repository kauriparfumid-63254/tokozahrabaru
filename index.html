<!DOCTYPE html>
<input type="number" id="i_bri1" placeholder="BRI1">
<input type="number" id="i_bri2" placeholder="BRI2">
<input type="number" id="i_elang" placeholder="Elang">
<input type="number" id="i_dana" placeholder="DANA">
<input type="number" id="i_liga" placeholder="Liga">
<button onclick="simpan()">Simpan Online</button>
</div>

<div class="card">
<h3>Riwayat</h3>
<div id="list"></div>
</div>

</div>

<script>
let data=[];

async function load(){
 let snap = await window.firebaseFns.getDocs(window.firebaseFns.collection(window.db,"brilink"));
 data=[];
 snap.forEach(doc=> data.push({...doc.data(),id:doc.id}));
 render();
}

async function simpan(){
 let d={
  tgl:document.getElementById('tgl').value,
  tunai:+i_tunai.value||0,
  bri1:+i_bri1.value||0,
  bri2:+i_bri2.value||0,
  elang:+i_elang.value||0,
  dana:+i_dana.value||0,
  liga:+i_liga.value||0
 };
 d.total = d.tunai+d.bri1+d.bri2+d.elang+d.dana+d.liga;

 await window.firebaseFns.addDoc(window.firebaseFns.collection(window.db,"brilink"),d);
 load();
}

async function hapus(id){
 await window.firebaseFns.deleteDoc(window.firebaseFns.doc(window.db,"brilink",id));
 load();
}

function render(){
 let total=0;
 let list=document.getElementById('list');
 list.innerHTML="";

 let labels=[], values=[];

 data.forEach(d=>{
  total+=d.total;
  labels.push(d.tgl);
  values.push(d.total);

  list.innerHTML+=`<div class='card'>${d.tgl} - Rp ${d.total} <button onclick="hapus('${d.id}')">Hapus</button></div>`;
 });

 document.getElementById('grandTotal').innerText='Rp '+total;

 if(data.length>0){
  let last=data[data.length-1];
  tunai.innerText=last.tunai;
  bri1.innerText=last.bri1;
  bri2.innerText=last.bri2;
  elang.innerText=last.elang;
  dana.innerText=last.dana;
  liga.innerText=last.liga;
 }

 new Chart(document.getElementById('chart'),{
  type:'line',
  data:{labels:labels,datasets:[{label:'Saldo',data:values}]}
 });
}

load();
</script>

</body>
</html>
